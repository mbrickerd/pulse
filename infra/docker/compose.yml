services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: pulse-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qg==
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16
    container_name: pulse-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=pulse
      - POSTGRES_USER=pulse
      - POSTGRES_PASSWORD=pulse
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pulse" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: pulse-kafka-ui
    ports:
      - "8081:8080"
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=pulse
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: pulse-api
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8082:8081"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SERVER_PORT=8080

  processor:
    build:
      context: ../..
      dockerfile: services/processor/Dockerfile
    container_name: pulse-processor
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PULSE_KAFKA_CONSUMER_GROUP=processor

  projector:
    build:
      context: ../..
      dockerfile: services/projector/Dockerfile
    container_name: pulse-projector
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
      - "8084:8084"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/pulse
      - SPRING_DATASOURCE_USERNAME=pulse
      - SPRING_DATASOURCE_PASSWORD=pulse