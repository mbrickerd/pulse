build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    thresholdInObjects: 15
    thresholdInEnums: 10
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
  CyclomaticComplexMethod:
    active: true
    threshold: 15

naming:
  MagicNumber:
    active: false

style:
  MaxLineLength:
    active: true
    maxLineLength: 140
  WildcardImport:
    active: true
  UnusedImports:
    active: true
  ReturnCount:
    active: true
    max: 4
