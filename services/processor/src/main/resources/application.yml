spring:
  application:
    name: pulse-processor
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    template:
      observation-enabled: true
    consumer:
      group-id: ${PULSE_KAFKA_CONSUMER_GROUP:pulse-processor}
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{transactionId}] [%X{traceId}] %logger{36} - %msg%n"
  level:
    root: INFO

pulse:
  risk:
    high-amount-threshold: 2500.00
    low-risk-countries:
      - NL
      - BE
      - DE
      - FR
      - LU
      - DK
      - SE
      - NO
      - FI
      - IE
    high-risk-merchant-categories:
      - gift_cards
      - crypto
      - gambling
      - electronics_resale
    suspicious-email-domains:
      - mailinator.com
      - tempmail.com
      - 10minutemail.com
    score-impacts:
      high-amount: 60
      foreign-billing-country: 20
      high-risk-merchant-category: 20
      missing-device-id: 10
      suspicious-email-domain: 15
    risk-level-thresholds:
      medium: 40
      high: 80
